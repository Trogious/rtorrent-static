name: Build dynamic rtorrent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - codename: focal
            container: ubuntu:20.04
          - codename: jammy
            container: ubuntu:22.04
          - codename: noble
            container: ubuntu:24.04
          - codename: resolute
            container: ubuntu:26.04
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Build dynamic rtorrent
        run: bash scripts/build-dynamic.sh

      - name: Get build outputs
        id: build
        run: |
          echo "artifact=$(cat /output/artifact-name)" >> "$GITHUB_OUTPUT"
          echo "tag=$(cat /output/release-tag)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact }}
          path: /output/rtorrent-*.txz

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ matrix.codename }}
          path: /output/release-notes-*.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get release tag
        id: tag
        run: |
          TAG=$(ls artifacts/rtorrent-v*/rtorrent-v*.txz | head -1 | grep -oP 'rtorrent-\Kv[0-9.]+' | head -1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Assemble release notes
        run: |
          {
            echo "## Build Details"
            echo ""
            echo "**Build type:** Dynamic"
            echo ""
            for f in artifacts/release-notes-*/release-notes-*.md; do
              cat "$f"
              echo ""
              echo "---"
              echo ""
            done
          } > release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.version }}-dynamic"
          gh release create "$TAG" \
            --title "rtorrent ${{ steps.tag.outputs.version }} (Ubuntu dynamic builds)" \
            --notes-file release-notes.md \
            artifacts/rtorrent-v*/rtorrent-v*.txz
